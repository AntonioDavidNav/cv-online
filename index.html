<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antonio David Navarro Ledesma</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    margin-bottom:10px;
}

p{
    color:#cbd5e1;
    margin-bottom:30px;
}

.btn{
    display:block;
    width:250px;
    margin:15px auto;
    padding:15px;
    border-radius:12px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.es{
    background:#22c55e;
    color:white;
}

.en{
    background:#3b82f6;
    color:white;
}

.btn:hover{
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="card">
    <h1>Antonio David Navarro Ledesma</h1>
    <p>SMR Student • IT Support • Networking</p>

    <a class="btn es" href="CV_Antonio_David_ES.pdf" target="_blank">
        🇪🇸 Currículum en Español
    </a>

    <a class="btn en" href="CV_Antonio_David_EN.pdf" target="_blank">
        🇬🇧 CV in English
    </a>
</div>

</body>
</html>
